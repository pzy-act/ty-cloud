spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/ty_cloud?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 333
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0

logging:
  level:
    com.vip.tycloud.mapper: debug

ty:
  security:
    jwt:
      # Override in production with env var.
      secret: ${TY_JWT_SECRET:ty-cloud-jwt-secret-please-change-this-in-production-123456}
      access-token-expire-seconds: 7200
      refresh-token-expire-seconds: 86400
      remember-me-refresh-token-expire-seconds: 604800
